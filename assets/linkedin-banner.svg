<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@700&amp;family=Inter:wght@400;500&amp;display=swap');
    </style>

    <!-- Subtle vertical grid pattern -->
    <pattern id="grid" x="0" y="0" width="90" height="396" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="396" stroke="#131515" stroke-width="0.5" opacity="0.04"/>
    </pattern>

    <!-- Soft radial glow behind text area -->
    <radialGradient id="glow" cx="0.55" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fbfaf7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fbfaf7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="#fbfaf7"/>

  <!-- Grid overlay -->
  <rect width="1584" height="396" fill="url(#grid)"/>

  <!-- Geometric accents — soft circles (right side, matching OG style) -->
  <circle cx="1380" cy="280" r="180" fill="none" stroke="#e23d28" stroke-width="1" opacity="0.10"/>
  <circle cx="1440" cy="320" r="120" fill="#e23d28" opacity="0.04"/>
  <circle cx="1200" cy="60" r="240" fill="none" stroke="#e23d28" stroke-width="0.8" opacity="0.08"/>

  <!-- Geometric accents — teal elements -->
  <circle cx="1100" cy="340" r="5" fill="#0ea5a4" opacity="0.18"/>
  <circle cx="1115" cy="355" r="3" fill="#0ea5a4" opacity="0.14"/>
  <circle cx="1090" cy="360" r="2.5" fill="#0ea5a4" opacity="0.12"/>

  <!-- Diamond shape (matching OG) -->
  <rect x="1300" y="100" width="24" height="24" rx="2" fill="none" stroke="#e23d28" stroke-width="0.8" opacity="0.12" transform="rotate(45, 1312, 112)"/>

  <!-- Corner accents (matching OG style) -->
  <line x1="1544" y1="20" x2="1564" y2="20" stroke="#4b5563" stroke-width="0.8" opacity="0.15"/>
  <line x1="1564" y1="20" x2="1564" y2="40" stroke="#4b5563" stroke-width="0.8" opacity="0.15"/>

  <line x1="20" y1="376" x2="20" y2="360" stroke="#4b5563" stroke-width="0.8" opacity="0.15"/>
  <line x1="20" y1="376" x2="36" y2="376" stroke="#4b5563" stroke-width="0.8" opacity="0.15"/>

  <!-- Soft radial glow behind text area -->
  <rect x="300" y="0" width="900" height="396" fill="url(#glow)"/>

  <!-- Primary tagline -->
  <text x="792" y="155" text-anchor="middle" font-family="'Fraunces', Georgia, serif" font-weight="700" font-size="42" fill="#131515" letter-spacing="-0.01em">I like the messy middle.</text>

  <!-- Red accent line -->
  <rect x="772" y="178" width="40" height="3" rx="1.5" fill="#e23d28"/>

  <!-- Subtitle -->
  <text x="792" y="218" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-weight="400" font-size="17" fill="#4b5563">Clarifying decisions. Aligning stakeholders. Keeping delivery moving.</text>

  <!-- URL with red dot -->
  <circle cx="741" cy="268" r="3.5" fill="#e23d28"/>
  <text x="754" y="272" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="13" fill="#4b5563" letter-spacing="0.12em" text-transform="uppercase">WILLMCCUMBER.COM</text>
</svg>
